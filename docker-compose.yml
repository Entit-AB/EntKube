services:
  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DOMAIN: "${DOMAIN}"
      ACME_EMAIL: "${ACME_EMAIL}"
    depends_on:
      - entkube
    restart: unless-stopped

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: entkube
      POSTGRES_USER: entkube
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-changeme}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U entkube -d entkube"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # Durable object storage for the self-built Lucene/S3 telemetry segment engine (logs / traces / RUM).
  # OPTIONAL: only started with the "objectstore" profile (`docker compose --profile objectstore up -d`)
  # and used when Telemetry__ObjectStorage__* is set on the app. Without it the engine falls back to
  # local disk under /app/Data — fine for a single node; MinIO gives durable, restart-surviving storage.
  # (Metrics are served by Prometheus; there is no longer a Postgres telemetry database.)
  minio:
    image: minio/minio:latest
    profiles: ["objectstore"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-entkube}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-changeme-minio}"
    volumes:
      - minio-data:/data
    restart: unless-stopped

  # One-shot: create the telemetry bucket if absent, then exit. Retries until MinIO is reachable.
  minio-init:
    image: minio/mc:latest
    profiles: ["objectstore"]
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-entkube}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-changeme-minio}"
      TELEMETRY_BUCKET: "${TELEMETRY_BUCKET:-entkube-telemetry}"
    entrypoint: >
      /bin/sh -c "
      until mc alias set tel http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do echo 'waiting for minio'; sleep 2; done &&
      mc mb --ignore-existing tel/$$TELEMETRY_BUCKET &&
      echo 'telemetry bucket ready'"
    restart: "no"

  entkube:
    image: ${REGISTRY:-entit.azurecr.io}/entkube:${IMAGE_TAG:-latest}
    volumes:
      - entkube-data:/app/Data
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # --- Database ---
      DatabaseProvider: Postgres
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=entkube;Username=entkube;Password=${POSTGRES_PASSWORD:-changeme}"

      # --- Telemetry (self-built Lucene/S3 segment engine — logs / traces / RUM) ---
      # Base URL clusters use to reach this server. The app appends /ingest/otlp to
      # build the collector's Ingest URL. Must be externally reachable from clusters.
      Telemetry__PublicIngestUrl: "https://${DOMAIN}"
      # How many days of telemetry to retain (sealed segments older than this are dropped).
      Telemetry__RetentionDays: "${TELEMETRY_RETENTION_DAYS:-14}"
      # Local state (active index + sealed-segment cache). Persisted on the entkube-data volume.
      Telemetry__DataPath: "/app/Data/telemetry"
      # Metrics are served by Prometheus (apps write there directly) — there is no telemetry database.

      # --- Durable object storage (OPTIONAL) ---
      # By default sealed segments live on local disk under Telemetry__DataPath (fine for one node).
      # For durable, restart-surviving storage, run MinIO (`docker compose --profile objectstore up -d`)
      # and uncomment the block below to point the engine at it.
      # Telemetry__ObjectStorage__Endpoint: "http://minio:9000"
      # Telemetry__ObjectStorage__Bucket: "${TELEMETRY_BUCKET:-entkube-telemetry}"
      # Telemetry__ObjectStorage__Region: "us-east-1"
      # Telemetry__ObjectStorage__AccessKey: "${MINIO_ROOT_USER:-entkube}"
      # Telemetry__ObjectStorage__SecretKey: "${MINIO_ROOT_PASSWORD:-changeme-minio}"
      # Telemetry__ObjectStorage__ForcePathStyle: "true"

      # --- Vault encryption ---
      # Required — set VAULT__ROOTKEY in your .env file (openssl rand -base64 32)
      Vault__RootKey: "${VAULT__ROOTKEY}"

      # --- DataProtection keys ---
      # Persist the key ring on the existing entkube-data volume so antiforgery/auth
      # cookies survive restarts (otherwise every deploy forces all users to re-login).
      DataProtection__KeyPath: "/app/Data/keys"

      # --- Reverse proxy ---
      # Tells ASP.NET Core to trust X-Forwarded-For / X-Forwarded-Proto from Caddy.
      # Required for Blazor Server SignalR (WebSocket) to work correctly behind a proxy.
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"

      # --- Auth ---
      # Set to false after the first admin account is created.
      Auth__AllowRegistration: "true"

      # --- Temporary: log all HTTP requests so we can see 404s ---
      Logging__LogLevel__Microsoft__AspNetCore__Hosting__Diagnostics: "Information"

      # --- Bootstrap ---
      # Optional. If set, this user is granted the Admin role on every startup
      # (no-op if already admin). Useful for recovering access.
      # Seed__AdminEmail: "admin@example.com"

      # --- Email / SMTP (optional) ---
      # Smtp__Host: "smtp.example.com"
      # Smtp__Username: "user"
      # Smtp__Password: "password"
      # Smtp__FromAddress: "alerts@entkube.io"
    restart: unless-stopped

volumes:
  # Named volumes are NOT removed by "docker compose down".
  # Data is only deleted if you explicitly run "docker compose down -v".
  postgres-data:
  minio-data:
  entkube-data:
  caddy-data:
  caddy-config:
